name: Build Release APK

# GitHub 上で手動でリリースを公開(publish)したときに発火する
on:
  release:
    types: [published]

permissions:
  contents: write # リリースアセットのアップロードに必要

jobs:
  # コミット/PR から変更履歴(Changelog)を自動生成し、本文を常に上書きする
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and overwrite release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          # 本文の有無に関わらず、毎回自動生成した変更履歴で上書きする。
          notes=$(gh api -X POST "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body // empty')
          # API が空 body を返した場合(タグ間コミット 0 件など)はスキップ。
          # 空ファイルで gh release edit するとリリース本文が消えるため。
          [ -n "$notes" ] || { echo "generate-notes returned empty body; skipping."; exit 0; }
          printf '%s' "$notes" > notes.md
          # このジョブは checkout していないため、--repo でリポジトリを明示する
          # (省略すると gh が git からリポジトリを特定できず失敗する)
          gh release edit "$TAG" --repo "$REPO" --notes-file notes.md

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # gradle.properties の org.gradle.java.home はローカル(Windows)固定パスのため
      # CI ランナーには存在しない。削除して setup-java の JDK を使わせる。
      - name: Remove local org.gradle.java.home
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # タグ(例: v1.0)をそのままファイル名用に、先頭 v を除いた値を versionName 用に取り出す。
      # 生のイベント値はシェルへ直接展開せず env 経由で受け、以降は steps.ver.outputs.* を使う。
      - name: Resolve version
        id: ver
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "name=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/povo-manager_${{ steps.ver.outputs.tag }}.apk"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            "dist/povo-manager_${{ steps.ver.outputs.tag }}.apk" --clobber
