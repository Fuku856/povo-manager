name: Build Release APK

# GitHub 上で手動でリリースを公開(publish)したときに発火する
on:
  release:
    types: [published]

permissions:
  contents: write # リリースアセットのアップロードに必要

jobs:
  # コミット/PR から変更履歴(Changelog)を自動生成し、本文を常に上書きする。
  # さらに PR 一覧を Claude に渡して、利用者向けの新機能/修正点の要約を先頭に付ける。
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and overwrite release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
          # 要約生成に使用。Claude Pro/Max サブスクの OAuth トークン(API クレジット不要)。
          # 未設定でも従来の自動生成 changelog は出力される。
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # 本文の有無に関わらず、毎回自動生成した変更履歴で上書きする。
          notes=$(gh api -X POST "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body // empty')
          # API が空 body を返した場合(タグ間コミット 0 件など)はスキップ。
          # 空ファイルで gh release edit するとリリース本文が消えるため。
          [ -n "$notes" ] || { echo "generate-notes returned empty body; skipping."; exit 0; }

          # --- Claude で利用者向けの要約(新機能/改善・修正)を生成 ---
          # トークンが無い/呼び出しに失敗した場合は要約を諦め、従来の一覧のみで続行する。
          summary=""
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            # $'...' で改行(\n)を含む1行文字列にし、YAML ブロックのインデントを崩さない。
            system=$'あなたは Android アプリ「povo Manager」のリリース担当です。以下は GitHub が自動生成したリリースノート(PR 一覧)です。これを読み、アプリの利用者(エンドユーザー)向けに、今回の変更点を日本語の箇条書きで要約してください。\n\n出力ルール:\n- Markdown のみを出力し、前置きや結びの文章は書かない。\n- 見出しは「### 新機能」「### 改善・修正」の 2 つを使う(該当する変更が無い見出しは省略)。\n- 各項目は体言止め(名詞で終える)で統一する。「〜しました」「〜した」「〜なった」などの述語で終えない。例:「残日数の色分けを4段階に変更」。\n- PR から確認できる事実だけを書く。推測や誇張、効果・利点の主観的な説明(例:「〜しやすくなった」)は書かない。\n- 1 項目につき変更 1 つを簡潔に書き、PR タイトルをそのまま転記せず平易な日本語にする。\n- 絵文字は一切使わない。\n- CI / GitHub Actions / ドキュメント等、利用者に関係しない内部的な変更は含めない。\n- 各見出しの項目は最大 6 個程度に収め、重要なものを優先する。'

            # OAuth トークン(Claude Code)で /v1/messages を使う場合、システムは
            # Claude Code の識別文のみにする必要がある。要約指示は user メッセージ側に入れる
            # (system に独自の指示ブロックを足すと OAuth トークンでは弾かれるため)。
            identity="You are Claude Code, Anthropic's official CLI for Claude."

            # jq でペイロードを安全に組み立てる(改行や記号を含む notes をそのまま埋め込む)。
            # 要約指示($sys)とリリースノート($notes)を 1 つの user メッセージに連結する。
            jq -n --arg id "$identity" --arg sys "$system" --arg notes "$notes" \
              '{model:"claude-sonnet-4-6", max_tokens:1500,
                system:[{type:"text", text:$id}],
                messages:[{role:"user",
                  content:($sys + "\n\n以下が GitHub 自動生成のリリースノートです:\n\n" + $notes)}]}' > payload.json

            # OAuth トークンは x-api-key ではなく Authorization: Bearer ＋ oauth ベータヘッダーを使う。
            resp=$(curl -sS https://api.anthropic.com/v1/messages \
              -H "Authorization: Bearer $CLAUDE_CODE_OAUTH_TOKEN" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: oauth-2025-04-20" \
              -H "content-type: application/json" \
              -d @payload.json || true)
            # 成功時のみ text ブロックを取り出す。失敗・空応答なら summary は空のまま。
            summary=$(printf '%s' "$resp" \
              | jq -r '[.content[]? | select(.type=="text") | .text] | join("")' 2>/dev/null || true)
            [ "$summary" = "null" ] && summary=""
          fi

          # 要約が得られたら先頭に差し込み、区切り線を挟んで従来の一覧を続ける。
          if [ -n "$summary" ]; then
            {
              echo "## $TAG の変更点"
              echo
              printf '%s\n' "$summary"
              echo
              echo "---"
              echo
              printf '%s\n' "$notes"
            } > notes.md
          else
            printf '%s' "$notes" > notes.md
          fi

          # このジョブは checkout していないため、--repo でリポジトリを明示する
          # (省略すると gh が git からリポジトリを特定できず失敗する)
          gh release edit "$TAG" --repo "$REPO" --notes-file notes.md

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # gradle.properties の org.gradle.java.home はローカル(Windows)固定パスのため
      # CI ランナーには存在しない。削除して setup-java の JDK を使わせる。
      - name: Remove local org.gradle.java.home
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # タグ(例: v1.0)をそのままファイル名用に、先頭 v を除いた値を versionName 用に取り出す。
      # 生のイベント値はシェルへ直接展開せず env 経由で受け、以降は steps.ver.outputs.* を使う。
      - name: Resolve version
        id: ver
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "name=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/povo-manager_${{ steps.ver.outputs.tag }}.apk"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.ver.outputs.tag }}" \
            "dist/povo-manager_${{ steps.ver.outputs.tag }}.apk" --clobber
