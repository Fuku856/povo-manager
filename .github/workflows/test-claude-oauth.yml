name: Test Claude OAuth (diagnostic)

# 手動実行専用。OAuth トークンで /v1/messages を叩けるか確認するための一時的な診断用。
# トークンは出力しない。HTTP ステータスとレスポンス本文のみ表示する。
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Call /v1/messages with OAuth token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] || { echo "secret not set"; exit 1; }

          identity="You are Claude Code, Anthropic's official CLI for Claude."
          jq -n --arg id "$identity" \
            '{model:"claude-sonnet-4-6", max_tokens:64,
              system:[{type:"text", text:$id}],
              messages:[{role:"user", content:"日本語で「テスト成功」とだけ言って。"}]}' > payload.json

          # -w で HTTP ステータス、本文は body.txt に分離して表示する。
          code=$(curl -sS -o body.txt -w '%{http_code}' https://api.anthropic.com/v1/messages \
            -H "Authorization: Bearer $CLAUDE_CODE_OAUTH_TOKEN" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: oauth-2025-04-20" \
            -H "content-type: application/json" \
            -d @payload.json)

          echo "HTTP status: $code"
          echo "----- response body -----"
          cat body.txt
          echo
          echo "-------------------------"
